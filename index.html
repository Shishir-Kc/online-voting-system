<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        .candidate {
            margin: 15px 0;
            font-size: 18px;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #00c6ff;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }

        .disabled {
            background: gray !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Online Voting System</h1>

    <div class="candidate">
        <input type="radio" name="vote" value="Balen Shah"> Balen Shah
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="Kp oli sharma"> Kp oli sharma
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="Pushpa Kamal Dahal"> Pushpa Kamal Dahal
    </div>

    <button id="voteBtn" onclick="vote()">Vote</button>

    <div id="result"></div>
</div>

<script>
    // Run when page loads
    window.onload = function () {
        let voted = localStorage.getItem("voted");
        let candidate = localStorage.getItem("votedCandidate");

        if (voted === "true") {
            document.getElementById("result").innerHTML =
                "You have already voted for " + candidate;

            // Disable button
            document.getElementById("voteBtn").disabled = true;
            document.getElementById("voteBtn").classList.add("disabled");
        }
    };

    function vote() {
        // Prevent multiple voting
        if (localStorage.getItem("voted") === "true") {
            document.getElementById("result").innerHTML =
                "You have already voted!";
            return;
        }

        let candidates = document.getElementsByName("vote");
        let selected = "";

        for (let i = 0; i < candidates.length; i++) {
            if (candidates[i].checked) {
                selected = candidates[i].value;
            }
        }

        if (selected === "") {
            document.getElementById("result").innerHTML =
                "Please select a candidate!";
        } else {
            document.getElementById("result").innerHTML =
                "You voted for " + selected;

            // Save vote in browser
            localStorage.setItem("voted", "true");
            localStorage.setItem("votedCandidate", selected);

            // Disable button after voting
            document.getElementById("voteBtn").disabled = true;
            document.getElementById("voteBtn").classList.add("disabled");
        }
    }
</script>

</body>
</html>
