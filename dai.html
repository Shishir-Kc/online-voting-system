<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(135deg, #667eea, #764ba2);
            color:white;
        }

        /* Navbar */
        nav{
            background: rgba(0,0,0,0.3);
            padding:15px;
            text-align:center;
            font-size:22px;
            font-weight:600;
            letter-spacing:1px;
        }

        /* Main Section */
        .container{
            width:400px;
            background:white;
            color:black;
            margin:80px auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        .candidate{
            margin:15px 0;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:10px 25px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#764ba2;
        }

        #message{
            margin-top:15px;
            font-weight:600;
            color:green;
        }

        .results{
            margin-top:20px;
            text-align:left;
            font-size:15px;
        }

        footer{
            text-align:center;
            margin-top:40px;
            padding:15px;
            background:rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<nav>
    Online Voting System
</nav>

<div class="container">
    <h2>Cast Your Vote</h2>

    <div class="candidate">
        <input type="radio" name="vote" value="A"> Candidate A
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="B"> Candidate B
    </div>

    <div class="candidate">
        <input type="radio" name="vote" value="C"> Candidate C
    </div>

    <button onclick="vote()">Submit Vote</button>

    <div id="message"></div>

    <div class="results">
        <p>Candidate A: <span id="countA">0</span></p>
        <p>Candidate B: <span id="countB">0</span></p>
        <p>Candidate C: <span id="countC">0</span></p>
    </div>
</div>

<footer>
    © 2026 Online Voting System | Developed by Student
</footer>

<script>
    let voted = false;
    let countA = 0;
    let countB = 0;
    let countC = 0;

    function vote(){
        if(voted){
            document.getElementById("message").innerHTML = "You have already voted!";
            return;
        }

        let candidates = document.getElementsByName("vote");
        let selected = "";

        for(let i=0; i<candidates.length; i++){
            if(candidates[i].checked){
                selected = candidates[i].value;
            }
        }

        if(selected == ""){
            document.getElementById("message").innerHTML = "Please select a candidate!";
            return;
        }

        if(selected == "A"){
            countA++;
            document.getElementById("countA").innerHTML = countA;
        }
        else if(selected == "B"){
            countB++;
            document.getElementById("countB").innerHTML = countB;
        }
        else if(selected == "C"){
            countC++;
            document.getElementById("countC").innerHTML = countC;
        }

        document.getElementById("message").innerHTML = "Vote submitted successfully!";
        voted = true;
    }
</script>

</body>
</html>
